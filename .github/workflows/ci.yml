name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      # ruff carries the flake8-bandit (S) rules, so this is also the SAST pass.
      - name: Lint and SAST
        run: uv run ruff check src/ tests/

      - name: Test
        run: uv run pytest tests/ -v

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Audit dependencies for known vulnerabilities
        run: uv run --with pip-audit pip-audit

      - name: Scan filesystem for vulnerabilities and secrets
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: "1"
          scan-ref: .

      - name: Scan deploy configs for misconfiguration
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          severity: CRITICAL,HIGH
          exit-code: "1"
          scan-ref: deploy

      - name: Scan git history for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: arrowhead-sbom.cyclonedx.json
