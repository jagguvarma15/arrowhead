# Local development stack: the server plus Redis for shared rate-limit
# state. Auth is left off here so MCP Inspector can connect without an
# authorization server; enable it by setting the ARROWHEAD_OAUTH_* and
# ARROWHEAD_AUTH_ENABLED variables before deploying anywhere real.
services:
  arrowhead:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      ARROWHEAD_TRANSPORT: http
      ARROWHEAD_HOST: 0.0.0.0
      ARROWHEAD_PORT: "8000"
      ARROWHEAD_AUTH_ENABLED: "false"
      ARROWHEAD_REDIS_URL: redis://redis:6379/0
      ARROWHEAD_JAIL_ROOT: /app/sandbox
      ARROWHEAD_DOCS_ROOT: /app/documents
    volumes:
      # Path is relative to this compose file, so the repo-root sandbox
      # sits one level up.
      - ../sandbox:/app/sandbox:ro
      # A named volume keeps the write corpus across restarts.
      - arrowhead-corpus:/app/documents
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)
      interval: 15s
      timeout: 3s
      retries: 5
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  arrowhead-corpus:
