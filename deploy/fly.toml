# Fly.io alternative to Render. Fly terminates TLS at the edge
# (force_https) and forwards to the internal container port.
#
# Before deploying:
#   fly volumes create arrowhead_corpus --size 1   # durable document corpus
#   fly redis create                               # managed Redis (Upstash)
#   fly secrets set ARROWHEAD_REDIS_URL=... ARROWHEAD_OAUTH_ISSUER=... \
#     ARROWHEAD_OAUTH_AUDIENCE=... ARROWHEAD_OAUTH_JWKS_URI=... \
#     ARROWHEAD_SERVER_PUBLIC_URL=...
#
# The corpus volume attaches to a single machine, so the write corpus
# stays consistent on one instance; horizontal scale would need an
# object-storage backing (see the roadmap).
app = "arrowhead"
primary_region = "iad"

[build]
  dockerfile = "deploy/Dockerfile"

[env]
  ARROWHEAD_TRANSPORT = "http"
  ARROWHEAD_HOST = "0.0.0.0"
  ARROWHEAD_PORT = "8000"
  ARROWHEAD_AUTH_ENABLED = "true"
  ARROWHEAD_DOCS_ROOT = "/var/lib/arrowhead/documents"

[mounts]
  source = "arrowhead_corpus"
  destination = "/var/lib/arrowhead/documents"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  # Unauthenticated liveness probe; /mcp requires a bearer token.
  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
