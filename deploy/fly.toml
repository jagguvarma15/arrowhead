# Fly.io alternative to Render, useful when multi-region matters. Fly
# terminates TLS at the edge (force_https) and forwards to the internal
# container port. Provide a Redis via Upstash and set ARROWHEAD_REDIS_URL
# plus the OAuth secrets with `fly secrets set`.
app = "arrowhead"
primary_region = "iad"

[build]
  dockerfile = "deploy/Dockerfile"

[env]
  ARROWHEAD_TRANSPORT = "http"
  ARROWHEAD_HOST = "0.0.0.0"
  ARROWHEAD_PORT = "8000"
  ARROWHEAD_AUTH_ENABLED = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
