# Render blueprint: a containerized web service plus a managed Redis
# instance. Render terminates TLS and routes HTTPS to the container port.
services:
  - type: web
    name: arrowhead
    runtime: docker
    dockerfilePath: deploy/Dockerfile
    dockerContext: .
    plan: starter
    # A persistent disk makes the document corpus durable across deploys.
    # Attaching a disk pins the service to a single instance, so the
    # write corpus stays consistent; horizontal scale would need an
    # object-storage backing (see the roadmap).
    numInstances: 1
    disk:
      name: arrowhead-corpus
      mountPath: /var/lib/arrowhead/documents
      sizeGB: 1
    # Unauthenticated liveness probe; /mcp requires a bearer token.
    healthCheckPath: /health
    envVars:
      - key: ARROWHEAD_TRANSPORT
        value: http
      - key: ARROWHEAD_HOST
        value: 0.0.0.0
      - key: ARROWHEAD_PORT
        value: "8000"
      - key: ARROWHEAD_DOCS_ROOT
        value: /var/lib/arrowhead/documents
      - key: ARROWHEAD_AUTH_ENABLED
        value: "true"
      # Set these to your authorization server and this service's public
      # URL in the Render dashboard; they are secrets, not committed here.
      # For WorkOS: set ARROWHEAD_OAUTH_PROVIDER=workos and
      # ARROWHEAD_OAUTH_AUTHKIT_DOMAIN. For a JWT/JWKS IdP: leave the
      # provider as jwt and set the issuer, audience, and JWKS URI.
      - key: ARROWHEAD_OAUTH_PROVIDER
        sync: false
      - key: ARROWHEAD_OAUTH_AUTHKIT_DOMAIN
        sync: false
      - key: ARROWHEAD_OAUTH_ISSUER
        sync: false
      - key: ARROWHEAD_OAUTH_AUDIENCE
        sync: false
      - key: ARROWHEAD_OAUTH_JWKS_URI
        sync: false
      - key: ARROWHEAD_SERVER_PUBLIC_URL
        sync: false
      - key: ARROWHEAD_ALLOWED_HOSTS
        sync: false
      - key: ARROWHEAD_ALLOWED_ORIGINS
        sync: false
      - key: ARROWHEAD_REDIS_URL
        fromService:
          name: arrowhead-redis
          type: keyvalue
          property: connectionString

  - type: keyvalue
    name: arrowhead-redis
    plan: starter
    ipAllowList: []
